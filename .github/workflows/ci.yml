name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22
      - run: bun install --frozen-lockfile --registry https://registry.npmjs.org/
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      - run: bun run smoke:daemon
      - run: bun run generate:examples
      - run: bun run validate:examples
      - run: git diff --exit-code examples.json

  update-schema-tracking-tag:
    name: Update examples schema tracking tag
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read committed examples schema version
        id: schema
        shell: bash
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const catalog = JSON.parse(fs.readFileSync('examples.json', 'utf8'));
          const schemaVersion = catalog.schemaVersion;
          if (!Number.isInteger(schemaVersion) || schemaVersion < 1) {
            throw new Error(`examples.json#schemaVersion must be a positive integer, got ${JSON.stringify(schemaVersion)}.`);
          }
          console.log(`schema_version=${schemaVersion}`);
          console.log(`tag=examples-schema-v${schemaVersion}`);
          NODE
      - name: Force-update schema tracking tag
        shell: bash
        env:
          TAG: ${{ steps.schema.outputs.tag }}
        run: |
          set -euo pipefail
          current_sha="$(git rev-parse HEAD)"
          if [[ "$current_sha" != "$GITHUB_SHA" ]]; then
            echo "Checked-out commit $current_sha does not match push commit $GITHUB_SHA." >&2
            exit 1
          fi
          git tag -f "$TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/${TAG}"

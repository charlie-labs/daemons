id: pr-mergeability
title: PR mergeability
status: ready
summary: Keeps non-draft pull requests mergeable and CI-green without changing PR intent or scope.
readiness: adapt-before-use
showOnWebsite: true
showInDashboard: true
fit:
  jobsToBeDone:
    - maintain-and-modernize
    - review-with-confidence
  bestFor:
    - Repositories with active pull request queues and required mergeability checks.
    - Teams that want mechanical branch freshness and low-risk check fixes proposed on PRs.
  notFor:
    - Repositories where merge conflicts usually require product or design decisions.
    - Teams that do not want Charlie to push fixes to pull request branches.
requirements:
  requiredIntegrations:
    - github
  optionalIntegrations: []
  other:
    - A clear set of mergeability checks or branch protection rules.
    - Local commands for low-risk lint, snapshot, lockfile, or flaky-test maintenance.
adaptation:
  mustCustomize:
    - Confirm which required checks define mergeability for the repository.
    - Confirm which low-risk fix commands Charlie may run on PR branches.

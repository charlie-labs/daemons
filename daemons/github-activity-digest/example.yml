id: github-activity-digest
title: GitHub Activity Digest
status: ready
summary: Posts a low-noise scheduled digest of meaningful pull request and CI activity.
readiness: adapt-before-use
showOnWebsite: true
showInDashboard: true
fit:
  jobsToBeDone:
    - operate
  bestFor:
    - Teams that want lightweight visibility without manual GitHub status gathering.
    - Repositories with enough pull request and CI activity to summarize daily.
  notFor:
    - Teams that need incident, release, or people-management reporting beyond GitHub activity.
    - Repositories where activity volume is too low to justify a scheduled digest.
requirements:
  requiredIntegrations:
    - github
    - slack
  optionalIntegrations: []
  other:
    - A configured Slack channel for the digest.
    - Agreed signal thresholds and privacy rules for what belongs in the digest.
adaptation:
  mustCustomize:
    - Replace the Slack channel placeholder with the destination channel name.
    - Configure the duplicate-post detection strategy.

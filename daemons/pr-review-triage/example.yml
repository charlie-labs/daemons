id: pr-review-triage
title: PR review triage
status: ready
summary: Triages PR review threads and top-level PR comments for merge-readiness, duplicate feedback, fixed items, and safe low-noise follow-up.
readiness: adapt-before-use
showOnWebsite: true
showInDashboard: false
fit:
  jobsToBeDone:
    - review-with-confidence
  bestFor:
    - Repositories with frequent actionable GitHub review threads or PR comments that affect merge-readiness.
    - Teams that want non-human feedback deduplicated, corrected, or acknowledged without changing code.
  notFor:
    - Repositories where review feedback is tracked outside GitHub pull request threads.
requirements:
  requiredIntegrations:
    - github
  optionalIntegrations: []
  other:
    - GitHub pull request review threads and top-level PR comments are the source of truth for feedback state.
    - A repo-local policy for when duplicate or addressed feedback may be hidden or resolved.
adaptation:
  mustCustomize:
    - Review the action policy and ensure it is aligned with the team's expectations.
